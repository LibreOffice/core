# Config for Collabora Office app for Windows

# This is obviously COKit-only
--enable-kit-always-active

# Build environment
--enable-python=fully-internal
--disable-ccache
--disable-pch
--enable-mergelibs
--enable-release-build
--enable-symbols
--with-visual-studio=2022
--with-buildconfig-recorded
--without-lxml

# Branding
--with-branding=icon-themes/galaxy/brand_cp
--with-vendor=Collabora Productivity Limited

# MPLv2 subset
--disable-gpgmepp
--disable-lotuswordpro
--disable-lpsolve
--disable-mariadb-sdbc
--disable-poppler
--disable-postgresql-sdbc
--with-theme=colibre colibre_svg

# No Java
--without-java
--without-junit
--disable-ext-nlpsolver
--disable-ext-wiki-publisher
--disable-report-builder
--disable-scripting-beanshell
--disable-scripting-javascript

# COKit – tiled rendering
--disable-opengl
--disable-skia
--enable-cairo-rgba
--enable-headless

# Misc features
--disable-breakpad
--disable-cli
--disable-database-connectivity
--disable-firebird-sdbc
--disable-librelogo
--disable-online-update
--disable-opencl
--disable-sal-log
--disable-sdremote
--disable-sdremote-bluetooth
INCLUDE:Langs
--with-myspell-dicts
--without-galleries
--without-help
--without-templates

# Sensible font bundling settings for desktop
--with-fonts
--with-docrepair-fonts
--disable-noto-font
