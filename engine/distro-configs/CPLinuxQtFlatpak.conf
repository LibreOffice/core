# Engine configure switches for the Collabora Office flatpak build
# (qt/flatpak/com.collaboraoffice.Office.json builds the engine in-tree with
# ./autogen.sh --with-distro=CPLinuxQtFlatpak). The language list comes from
# Langs.conf via the INCLUDE below, so it is never duplicated here.
--disable-dbus
--disable-dconf
--disable-epm
--disable-evolution2
--disable-gio
--disable-gtk3
--disable-gui
--disable-kf5
--disable-noto-font
--disable-qt5
--disable-randr
--disable-sal-log
--disable-sdremote
--disable-sdremote-bluetooth
--enable-cairo-rgba
--enable-hardening-flags
--enable-mergelibs
--enable-symbols
--with-branding=icon-themes/galaxy/brand_cp
--with-docrepair-fonts
--with-fonts
--with-galleries=no
INCLUDE:Langs
--enable-ld
--with-linker-hash-style=both
--with-system-altlinuxhyph
--with-system-cppunit
--with-system-curl
--with-system-dicts
--with-system-expat
--with-system-fontconfig
--with-system-freetype
--with-system-graphite
--with-system-harfbuzz
--with-system-hunspell
--with-system-icu
--with-system-lcms2
--with-system-libpng
--with-system-libtiff
--with-system-libwebp
--with-system-libxml
--with-system-mythes
--with-system-nss
--with-system-openssl
--with-system-zlib
--with-system-zstd
--with-theme=colibre colibre_svg
--with-vendor=Collabora Productivity Limited
--without-buildconfig-recorded
--without-export-validation
--without-help
--without-junit
--without-lxml
--without-myspell-dicts
--without-system-abseil
--without-system-argon2
--without-system-boost
--without-system-box2d
--without-system-cairo
--without-system-clucene
