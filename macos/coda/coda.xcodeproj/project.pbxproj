		BEE076602CDA3024004111EF /* ShellScript */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
			);
			inputPaths = (
			);
			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Copy lokit to the bundle\nif [ -z \"$LO_PATH\" ]; then\n  echo \"Error: LO_PATH is not set. Please configure it in Config.xcconfig.\"\n  exit 1\nfi\n\n# I don't know why, but Xcode did not automatically compile \n# the storyboard after I added the localizations. I spent hours \n# to find out, giving up!\nSTORYBOARD=\"$SRCROOT/coda/Base.lproj/Main.storyboard\"\nOUTDIR=\"$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Base.lproj\"\necho \"Compiling storyboard: $STORYBOARD\"\nxcrun ibtool \\\n  --compile \"$OUTDIR/Main.storyboardc\" \\\n  \"$STORYBOARD\"\n\necho \"Copying $LO_PATH/Contents/ to ${CONFIGURATION_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/\"\nrsync -av \\\n    --exclude 'gengal' --exclude 'opencltest' --exclude 'soffice' --exclude 'uno' \\\n    --exclude 'unopkg' --exclude 'uri-encode' --exclude 'QuickLookPreview.*' \\\n    --exclude 'Info.plist' --exclude 'PlugIns' --exclude 'Spotlight' \\\n    \"$LO_PATH/Contents/\" \"${CONFIGURATION_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/\"\n\nfind \"${CONFIGURATION_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/\" -name *.dylib -size 21c -delete\n\n# Re-sign the dylibs for Release (not needed for development)\nif [ \"$CONFIGURATION\" = \"Release\" ]; then\n  SIGN_ID=\"$EXPANDED_CODE_SIGN_IDENTITY\"\n  for f in \"${CONFIGURATION_BUILD_DIR}/${PRODUCT_NAME}.app/Contents/Frameworks/\"*.dylib* ; do\n    [ -f \"$f\" ] || continue\n    codesign --force --sign \"$SIGN_ID\" --timestamp \"$f\"\n  done\nfi\n\n# Copy branding if it exists\nRESOURCES=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\nfor I in branding-desktop.css branding-mobile.css branding-tablet.css branding-unsupported.css branding-unsupported.js branding.css branding.js welcome ; do\n  SRC=\"$SRCROOT/../../browser/dist/$I\"\n  rm -rf \"$RESOURCES/$I\"\n  cp -a \"$SRC\" \"$RESOURCES/\" 2>/dev/null || echo \"Skipping non-existing $SRC\"\ndone\n\n# Copy TaskWorker.js (needed for Web Worker task threads)\nmkdir -p \"$RESOURCES/src/app\"\ncp \"$SRCROOT/../../browser/dist/src/app/TaskWorker.js\" \"$RESOURCES/src/app/\"\n";
		};
