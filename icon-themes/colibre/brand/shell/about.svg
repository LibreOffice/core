<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bgGrad)"/>

  <!-- Decorative teal accent bar at top -->
  <rect x="0" y="0" width="300" height="4" fill="url(#accentGrad)"/>

  <!-- Subtle geometric pattern -->
  <g opacity="0.06">
    <polygon points="150,20 280,95 280,245 150,320 20,245 20,95" fill="none" stroke="#0D9488" stroke-width="1"/>
    <polygon points="150,50 250,105 250,215 150,270 50,215 50,105" fill="none" stroke="#0D9488" stroke-width="1"/>
    <polygon points="150,80 220,115 220,185 150,220 80,185 80,115" fill="none" stroke="#0D9488" stroke-width="1"/>
  </g>

  <!-- Large centered diamond -->
  <g transform="translate(150, 120)">
    <polygon points="0,-40 40,0 0,40 -40,0" fill="url(#accentGrad)" opacity="0.9"/>
    <!-- Inner highlight -->
    <polygon points="0,-24 24,0 0,24 -24,0" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- OfficeLabs text -->
  <text x="150" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9" letter-spacing="1">OfficeLabs</text>

  <!-- Tagline -->
  <text x="150" y="228" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8" letter-spacing="2">AI-POWERED OFFICE SUITE</text>

  <!-- Bottom accent line -->
  <line x1="100" y1="250" x2="200" y2="250" stroke="#0D9488" stroke-width="1" opacity="0.5"/>
</svg>
