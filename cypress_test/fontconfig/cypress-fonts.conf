<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<!-- Cypress draws jsdialogs as HTML in the browser, so their text is
	     rendered with the host's default sans font. That default differs
	     between distributions (Noto Sans on Fedora, DejaVu Sans on the CI
	     image), which changes widget text widths and breaks the
	     pixel-compared snapshots. Pin the generic UI families to DejaVu Sans
	     so every machine renders the browser UI the way the committed
	     baselines were captured. Document-canvas text is drawn by the kit
	     with the bundled fonts under the jail's own fontconfig and is not
	     affected by this file. -->
	<include ignore_missing="yes">/etc/fonts/fonts.conf</include>

	<alias binding="strong">
		<family>sans-serif</family>
		<prefer><family>DejaVu Sans</family></prefer>
	</alias>
	<alias binding="strong">
		<family>system-ui</family>
		<prefer><family>DejaVu Sans</family></prefer>
	</alias>
</fontconfig>
