name: collabora-office
adopt-info: collabora-office
summary: Collabora Office — create, edit and present with a modern UI
description: |
  Collabora Office brings the familiar Collabora Online experience
  to your computer — so you can create, edit, and present with a beautiful,
  modern UI. Based on LibreOffice, it delivers excellent interoperability
  with ODF and Microsoft Office formats (DOCX/XLSX/PPTX), and exports to
  PDF with ease. Your documents stay on your device unless you choose to
  share them — privacy by design.

  Why you'll love it:
  * Instantly familiar: Same interface as Collabora Online — no relearning
  * Powerful offline working: Work locally with your files, printers, and shortcuts
  * Great compatibility: DOCX or ODF, we want to work your way, not the other way around
  * Focused & fast: A clean, streamlined workspace designed for flow
  * Open source & transparent: Openly developed, no hidden spyware

  Key features:
  * Writer, Calc, and Impress editing with a consistent, modern UI
  * Excellent document interoperability; robust ODF & OOXML support
  * Local file access; print with native system dialogs
  * Works great alongside Collabora Online for team collaboration
  * No cloud required

icon: qt/hicolor/scalable/apps/com.collaboraoffice.Office.startcenter.svg
license: MPL-2.0
base: core24
platforms:
  amd64:
  arm64:
grade: devel
confinement: strict
compression: lzo

# kde-neon-6 provides Qt6 (including WebEngine) from the kde-qt6-core24
# content snap and handles desktop integration for Qt apps on core24.
apps:
  collabora-office:
    extensions: [kde-neon-6]
    command: usr/bin/coda-qt
    desktop: usr/share/applications/com.collaboraoffice.Office.desktop
    common-id: com.collaboraoffice.Office
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/collaboraoffice/program:$LD_LIBRARY_PATH
      # Chromium's nested user-namespace sandbox needs unshare() and a
      # writable /proc tree that snap's seccomp filter and mount layout
      # don't grant. Without this, QtWebEngineProcess aborts in
      # credentials.cc with "Permission denied" on the first launch
      # (and Qt sometimes manages to cache its way past it on subsequent
      # launches). Snap confinement is already a sandbox, so disabling
      # Chromium's inner sandbox is the right move here.
      QTWEBENGINE_DISABLE_SANDBOX: "1"
    plugs:
      - home
      - network
      - cups
      - removable-media
      - opengl
      - browser-support
      - audio-playback
    # Coda-Qt registers the well-known DBus name com.collaboraoffice.Office
    # for single-instance routing (open new doc in existing window). Without
    # an explicit slot the AppArmor profile blocks the ownership and the
    # registration fails, after which the app aborts.
    slots:
      - dbus-collabora-office

slots:
  dbus-collabora-office:
    interface: dbus
    bus: session
    name: com.collaboraoffice.Office

layout:
  /usr/lib/collaboraoffice:
    bind: $SNAP/usr/lib/collaboraoffice
  /usr/share/coolwsd:
    bind: $SNAP/usr/share/coolwsd
  /usr/share/hunspell:
    bind: $SNAP/usr/share/hunspell
  /usr/share/hyphen:
    bind: $SNAP/usr/share/hyphen
  /usr/share/mythes:
    bind: $SNAP/usr/share/mythes

parts:
  collabora-office:
    plugin: nil
    source: .
    source-type: local
    after: [poco]
    build-snaps:
      - kde-qt6-core24-sdk
    override-pull: |
      craftctl default
      # Translations live in their own gerrit repo and are gitignored in
      # the monorepo; clone shallowly into engine/translations so the
      # engine's --with-lang machinery can pick up .po files. Wipe any
      # pre-existing checkout the developer may have left behind locally
      # (and any stale state from a prior snapcraft run). Keep the
      # language list below in sync with engine/distro-configs/Langs.conf
      # (the top-level Makefile.am has a check-snap-langs rule).
      rm -rf engine/translations
      git clone --depth=1 --branch=main \
        https://gerrit.collaboraoffice.com/translations engine/translations
    override-build: |
      set -e

      # 1. Build the engine.
      pushd engine
      ./autogen.sh \
        --prefix=$(pwd)/inst \
        --disable-dbus \
        --disable-dconf \
        --disable-epm \
        --disable-evolution2 \
        --disable-ext-nlpsolver \
        --disable-ext-wiki-publisher \
        --disable-gio \
        --disable-gstreamer-1-0 \
        --disable-gtk3 \
        --disable-gui \
        --disable-kf5 \
        --disable-ldap \
        --disable-lotuswordpro \
        --disable-lpsolve \
        --disable-noto-font \
        --disable-online-update \
        --disable-poppler \
        --disable-postgresql-sdbc \
        --disable-qt5 \
        --disable-randr \
        --disable-report-builder \
        --disable-sal-log \
        --disable-scripting-beanshell \
        --disable-scripting-javascript \
        --disable-sdremote \
        --disable-sdremote-bluetooth \
        --enable-cairo-rgba \
        --enable-extension-integration \
        --enable-hardening-flags \
        --enable-mergelibs \
        --enable-mpl-subset \
        --enable-release-build \
        --with-branding=icon-themes/galaxy/brand_cp \
        --with-docrepair-fonts \
        --with-fonts \
        --with-galleries=no \
        "--with-lang=ar bg ca cs cy da de el en-US en-GB eo es eu fi fr ga gl he hr hu hy id is it ja kk ko lo nb nl oc pl pt pt-BR ro ru sk sl sq sv tr uk vi zh-CN zh-TW" \
        --with-linker-hash-style=both \
        --with-system-altlinuxhyph \
        --with-system-curl \
        --with-system-dicts \
        --with-system-expat \
        --with-system-fontconfig \
        --with-system-freetype \
        --without-system-graphite \
        --without-system-harfbuzz \
        --with-system-hunspell \
        --with-system-icu \
        --with-system-lcms2 \
        --with-system-libpng \
        --with-system-libtiff \
        --with-system-libwebp \
        --with-system-libxml \
        --with-system-mythes \
        --with-system-nss \
        --with-system-openssl \
        --with-system-zlib \
        --with-system-zstd \
        --with-theme="colibre colibre_svg" \
        --with-vendor="Collabora Productivity Limited" \
        --without-buildconfig-recorded \
        --without-help \
        --without-java \
        --without-junit \
        --without-lxml \
        --without-myspell-dicts \
        --without-system-abseil \
        --without-system-argon2 \
        --without-system-boost \
        --without-system-box2d \
        --without-system-cairo \
        --without-system-clucene \
        --without-system-coinmp \
        --without-system-cppunit \
        --without-system-dragonbox \
        --without-system-frozen \
        --without-system-glm \
        --without-system-jpeg \
        --without-system-libabw \
        --without-system-libcdr \
        --without-system-libcmis \
        --without-system-libebook \
        --without-system-libeot \
        --without-system-libepubgen \
        --without-system-libetonyek \
        --without-system-libexttextcat \
        --without-system-libfixmath \
        --without-system-libfreehand \
        --without-system-liblangtag \
        --without-system-libmspub \
        --without-system-libmwaw \
        --without-system-libnumbertext \
        --without-system-libodfgen \
        --without-system-libpagemaker \
        --without-system-libqxp \
        --without-system-librevenge \
        --without-system-libstaroffice \
        --without-system-libvisio \
        --without-system-libwpd \
        --without-system-libwpg \
        --without-system-libwps \
        --without-system-libzmf \
        --without-system-mdds \
        --without-system-odbc \
        --without-system-orcus \
        --without-system-redland \
        --without-system-sane \
        --without-system-xmlsec \
        --without-system-zxcvbn \
        --without-system-zxing \
        --without-templates

      make
      make distro-pack-install
      popd

      mkdir -p "$CRAFT_PART_INSTALL/usr/lib"
      cp -a engine/inst/lib/collaboraoffice "$CRAFT_PART_INSTALL/usr/lib/collaboraoffice"

      # 2. Build Collabora Online (the wsd/qtapp wrapper around the engine).
      # Ubuntu 24.04 ships Node 18; COOL requires >= 20
      if ! node --version 2>/dev/null | grep -qE '^v(2[0-9]|[3-9])'; then
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      fi
      autoreconf -vfi
      ./configure \
        --prefix=/usr \
        --enable-qtapp \
        --disable-ssl \
        --with-lo-path=/usr/lib/collaboraoffice \
        --with-lokit-path=$(pwd)/engine/include \
        --with-poco-includes="$CRAFT_STAGE/usr/include" \
        --with-poco-libs="$CRAFT_STAGE/usr/lib" \
        --with-vendor="Collabora Productivity Limited" \
        --with-app-name="Collabora Office" \
        --with-info-url="https://collaboraoffice.com/"
      craftctl set version="$(sed -n 's/^S\["PACKAGE_VERSION"\]="\(.*\)"/\1/p' config.status)"
      make
      make DESTDIR="$CRAFT_PART_INSTALL" install
    build-packages:
      - autoconf
      - automake
      - bison
      - bzip2
      - ca-certificates
      - curl
      - flex
      - fontforge
      - g++
      - git
      - gperf
      - libcppunit-dev
      - libcurl4-openssl-dev
      - libexpat1-dev
      - libfontconfig-dev
      - libfreetype-dev
      - libgraphite2-dev
      - libharfbuzz-dev
      - libhunspell-dev
      - libhyphen-dev
      - libicu-dev
      - liblcms2-dev
      - libmythes-dev
      - libnspr4-dev
      - libnss3-dev
      - libpng-dev
      - libssl-dev
      - libtiff-dev
      - libtool
      - libwebp-dev
      - libxml2-dev
      - libxslt1-dev
      - libzstd-dev
      - make
      - nasm
      - pkg-config
      - python3-dev
      - python3-lxml
      - python3-polib
      - python3-setuptools
      - rsync
      - unzip
      - uuid-runtime
      - wget
      - xsltproc
      - xz-utils
      - zip
      - zlib1g-dev
    stage-packages:
      - libcurl4t64
      - libexpat1
      - libfontconfig1
      - libfreetype6
      - libgraphite2-3
      - libharfbuzz0b
      - libharfbuzz-icu0
      - libhunspell-1.7-0
      - libicu74
      - liblcms2-2
      - libpng16-16t64
      - libtiff6
      - libwebp7
      - libxml2
      - libxslt1.1
      - libmythes-1.2-0
      - libnss3
      - libnspr4
      - libssl3t64
      - zlib1g
      - libzstd1
      - libhyphen0
      # Spelling dictionaries matching --with-lang (no hunspell package
      # in Ubuntu noble for cy, fi, ga, hy, ja, sq, zh-CN, zh-TW;
      # nb is covered by the generic Norwegian *-no package).
      - hunspell-ar
      - hunspell-bg
      - hunspell-ca
      - hunspell-cs
      - hunspell-da
      - hunspell-de-de
      - hunspell-el
      - hunspell-en-us
      - hunspell-en-gb
      - hunspell-eo
      - hunspell-es
      - hunspell-eu
      - hunspell-fr-classical
      - hunspell-gl
      - hunspell-he
      - hunspell-hr
      - hunspell-hu
      - hunspell-id
      - hunspell-is
      - hunspell-it
      - hunspell-kk
      - hunspell-ko
      - hunspell-lo
      - hunspell-nl
      - hunspell-no
      - hunspell-oc
      - hunspell-pl
      - hunspell-pt-pt
      - hunspell-pt-br
      - hunspell-ro
      - hunspell-ru
      - hunspell-sk
      - hunspell-sl
      - hunspell-sv
      - hunspell-tr
      - hunspell-uk
      - hunspell-vi
      # Hyphenation patterns
      - hyphen-bg
      - hyphen-ca
      - hyphen-cs
      - hyphen-da
      - hyphen-de
      - hyphen-el
      - hyphen-en-us
      - hyphen-en-gb
      - hyphen-eo
      - hyphen-es
      - hyphen-fi
      - hyphen-fr
      - hyphen-ga
      - hyphen-gl
      - hyphen-hr
      - hyphen-hu
      - hyphen-id
      - hyphen-is
      - hyphen-it
      - hyphen-nl
      - hyphen-no
      - hyphen-pl
      - hyphen-pt-br
      - hyphen-pt-pt
      - hyphen-ro
      - hyphen-ru
      - hyphen-sk
      - hyphen-sl
      - hyphen-sv
      - hyphen-uk
      # Thesauri
      - mythes-ar
      - mythes-bg
      - mythes-ca
      - mythes-cs
      - mythes-da
      - mythes-de
      - mythes-en-us
      - mythes-eo
      - mythes-es
      - mythes-fr
      - mythes-gl
      - mythes-hu
      - mythes-id
      - mythes-is
      - mythes-it
      - mythes-no
      - mythes-pl
      - mythes-pt-br
      - mythes-pt-pt
      - mythes-ro
      - mythes-ru
      - mythes-sk
      - mythes-sl
      - mythes-sv
      - mythes-uk
    prime:
      # Dictionary stage-packages pull in the system office stack from
      # Ubuntu as a transitive dep; exclude its files to avoid conflicts
      # with our own engine build.
      - -usr/lib/libreoffice
      - -usr/lib/x86_64-linux-gnu/libuno*
      - -usr/share/doc/libreoffice*
      - -usr/share/doc/libuno*
      - -usr/share/doc/ure*
      - -usr/share/doc/uno*
  poco:
    plugin: cmake
    source: https://github.com/pocoproject/poco.git
    source-tag: poco-1.12.5-release
    source-depth: 1
    cmake-generator: Ninja
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
      - -DBUILD_SHARED_LIBS=OFF
      - -DENABLE_TESTS=OFF
      - -DENABLE_ACTIVERECORD=OFF
      - -DENABLE_ACTIVERECORD_COMPILER=OFF
      - -DENABLE_APACHECONNECTOR=OFF
      - -DENABLE_DATA=OFF
      - -DENABLE_DATA_MYSQL=OFF
      - -DENABLE_DATA_ODBC=OFF
      - -DENABLE_DATA_POSTGRESQL=OFF
      - -DENABLE_DATA_SQLITE=OFF
      - -DENABLE_ENCODINGS=OFF
      - -DENABLE_JWT=OFF
      - -DENABLE_MONGODB=OFF
      - -DENABLE_PAGECOMPILER=OFF
      - -DENABLE_PAGECOMPILER_FILE2PAGE=OFF
      - -DENABLE_PROMETHEUS=OFF
      - -DENABLE_REDIS=OFF
      - -DPOCO_UNBUNDLED=ON
    build-packages:
      - libexpat1-dev
      - libpcre2-dev
      - zlib1g-dev
    stage:
      - usr/lib
      - usr/include

  branding:
    plugin: nil
    source: https://www.collaboraoffice.com/downloads/collabora-office-brand/collabora-office-brand-25.04.9.3.tar.gz
    source-checksum: sha256/c6eb6d1b05612653d261e0dbe4b9fe0fb8eff660cdf39f858c7d0723068d6fa7
    after: [collabora-office]
    override-build: |
      set -e
      mkdir -p "$CRAFT_PART_INSTALL/usr/lib/collaboraoffice/share/theme_definitions"
      cp -a online-theme "$CRAFT_PART_INSTALL/usr/lib/collaboraoffice/share/theme_definitions/online/"
      mkdir -p "$CRAFT_PART_INSTALL/usr/share/coolwsd/browser/dist"
      cp -a branding* images welcome "$CRAFT_PART_INSTALL/usr/share/coolwsd/browser/dist/"
